<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/snake.png" type="image/x-icon">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0"/>
</head>
<body>
    <nav>
        <p>Score: <span id="score">0</span></p>
        <button id="btnStopGame" type="button">
            <span class="material-symbols-outlined">pause</span>
        </button>
    </nav>
    
    <div class="tela-inicial">
        <h1>Snake Game</h1>
        <button id="btnPlayGame">
            <span class="material-symbols-outlined">play_circle</span>
            Jogar
        </button>
    </div>

    <div class="game-over-menu" style="display: none;">
        <span class="game-over">Game Over</span>
        <p>Score:<span class="score-final"></span></p>

        <button id="btnPlayAgain">
            <span class="material-symbols-outlined">play_arrow</span>
            <span>Jogar Novamente</span>
        </button>
    </div>

    <canvas id="canvas" width="300px" height="300px"></canvas>

    <div class="btn-direction">
        <div>
            <button id="btnUp">
                <span class="material-symbols-outlined">arrow_drop_up</span>
            </button>
        </div>

        <div>
            <button id="btnLeft">
                <span class="material-symbols-outlined">arrow_left</span>
            </button>
            
            <button id="btnRight">
                <span class="material-symbols-outlined">arrow_right</span>
            </button>
        </div>

        <div>
            <button id="btnDown">
                <span class="material-symbols-outlined">arrow_drop_down</span>
            </button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
